<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Selector Generator</title>
		<link rel="stylesheet" href="popup.css">
	</head>
		<body>
			<div class="topbar">
				<button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
					<span class="theme-toggle-track" aria-hidden="true">
						<span class="theme-toggle-thumb"></span>
					</span>
				</button>
			</div>

		<p class="section-note">Output saves to clipboard</p>

		<label class="row option-row" for="out-xpath" id="row-xpath">
			<input id="out-xpath" type="radio" name="output" value="xpath">
			<span class="option-text">XPath</span>
			<span class="option-fill" aria-hidden="true"></span>
		</label>

		<label class="row option-row" for="out-css" id="row-css">
			<input id="out-css" type="radio" name="output" value="css">
			<span class="option-text">CSS</span>
			<span class="option-fill" aria-hidden="true"></span>
		</label>

		<hr>

		<button id="btn-save" class="secondary-button">Save preference</button>

		<div class="small" id="save-status"></div>

		<hr>

		<button id="btn-pick">Pick element (click)</button>

		<div class="small">
			Click the button above, then click an element on the current page to copy the strongest selector.
		</div>

		<hr>

		<div class="results-head">
			<strong>Recent Selector Options</strong>
		</div>

		<div id="selector-results" class="results-list">
			<div class="small" id="selector-results-empty">Pick an element to store the copied selector and up to three alternatives.</div>
		</div>

		<script src="../dist/popup.js"></script>
	</body>
</html>
